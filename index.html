<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="player-shell" class="pill">
    <div id="title-bar" class="drag-region">
      <div id="title-text"></div>
    </div>

    <div id="controls">
      <button id="btn-prev" class="no-drag">⏮</button>
      <button id="btn-playpause" class="no-drag">▶</button>
      <button id="btn-next" class="no-drag">⏭</button>
    </div>

    <div id="playlist-tab" class="no-drag">Playlist ▾</div>
  </div>

  <div id="playlist-panel" class="collapsed"></div>

  <audio id="audio"></audio>

  <script src="renderer.js"></script>
</body>
</html>
